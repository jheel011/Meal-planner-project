<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create and Register your family!</title>

    <link rel="stylesheet" href="style.css">
</head>
<body class = "page-create">
    <div class="createContainer">
        <nav class ="back">
            ← Back
        </nav>

        <div class="create-heading">
            <div id="main-heading">
            Create your family
            </div>
            
            <div id="sub-heading">
            Set up your group and invite members
            </div>
        </div>

        <form class="register-form">

            <div class="fam-name">
                <label>Family Name</label>
                <br>
                <input type="text" placeholder="eg. The Sharmas">
            </div>

            <div class="your-name">
                <label>Your Name</label>
                <br>
                <input type="text">
            </div>
            <div class="your-role">
                <label>Your Role</label>
                <br>
                <select>
                    <option value="cook">👑 Cook</option>
                    <option value="member">👨‍👩‍👧 Member</option>
                </select>
            </div>
            
            <div class="create_fam_button">
                <button> Create Family</button> </div>

        </form>
    </div>
        
</body>
</html>
