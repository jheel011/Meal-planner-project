<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create and Register your family!</title>

    <link rel="stylesheet" href="style.css">
    
</head>
<body class = "page-create">
    
    <div class="createContainer">
        <nav class ="back" onclick="window.location.href='index.html'">
            ← Back
        </nav>

        <div class="create-heading">
            <div id="main-heading">
            Create your family
            </div>
            
            <div id="sub-heading">
            Set up your group and invite members
            </div>
        </div>

        <form class="register-form">

            <div class="fam-name">
                <label for="famName">Family Name</label>
                
                <input type="text" placeholder="eg. The Sharmas" id ="famName">
            </div>

            <div class="your-name">
                <label for="yourName">Your Name</label>
                
                <input type="text" id="yourName">
            </div>
            <div class="your-role">
                <label for="yourRole">Your Role</label>
                <select id = "yourRole">
                    <option value="cook">👑 Cook</option>
                    <option value="member">👨‍👩‍👧 Member</option>
                </select>
            </div>
            
            <div class="create_fam_button" >
                <button type = button > Create Family →</button> </div>

        </form>

        <section class = "fam-code-box" id ="hidden">
            <div class = "message"></div>
            <p>Your family code is </p>
            <h1 id="generatedCode">SHRM49</h1>
            <p>Share this with your family members</p>
            <button id = "copy-msg-btn" onclick="copyCode()">📋 Copy Code</button>

        </section>
    </div>

    <script src = "script.js"></script>
        
</body>
</html>
